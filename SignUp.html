<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In-Avasthi</title>
    <link rel="Stylesheet" href="./SignUp.css">
</head>
<body>
    <div class="sign-container">
    <h2>Sign Up</h2>
    <form>
        <div class="sign-content">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Username" required></div>
        <div class="sign-content">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="email" required></div>
        <div class="sign-content">
        <label for="phone">Phone Number</label>
        <input type="tel" id="tel" name="tel" placeholder="Phone Number" required></div>
        <div class="sign-content">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="password" required></div>
        <a href="./form.html"><button type="submit">Sign Up As User</button></a>
        <hr>
        <button type="submit">Sign Up As Instructor</button>
        </form>
    </div>
</body>
</html>
