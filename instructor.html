<!DOCTYPE html>
<html>
<head>
    <title>Instructor Interface</title>
    <link rel="stylesheet" type="text/css" href="instructor.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <div id="cover-page" class="cover-page active">
                <h1>Welcome to the Instructor Interface</h1>
                <p>Please fill out the following form to provide your details and course information.</p>
                <button onclick="showFormPage()">Start</button>
            </div>
            <div id="form-page" class="form-page">
                <h2>Instructor Details</h2>
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name">
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="course">Course Name:</label>
                    <input type="text" id="course" name="course">
                </div>
                <div class="form-group">
                    <label for="description">Course Description:</label>
                    <textarea id="description" name="description"></textarea>
                </div>
                <div class="form-group">
                    <label for="free">Is the course free?</label>
                    <select id="free" name="free" onchange="toggleCommissionInfo()">
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>
                <div id="commission-info" class="form-group" style="display:none;">
                    <p>Since your course is not free, a 2% commission will be transferred to Avasthi.</p>
                </div>
                <div class="form-group">
                    <label for="image">Upload Profile Picture:</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>
                <div class="form-group">
                    <label for="course-image">Upload Course Image:</label>
                    <input type="file" id="course-image" name="course-image" accept="image/*">
                </div>
                <div class="button-group">
                    <button type="button" onclick="submitForm()">Submit</button>
                </div>
            </div>
        </div>
        <div class="image-section"></div>
    </div>
    <script>
        function showFormPage() {
            document.getElementById('cover-page').classList.remove('active');
            document.getElementById('form-page').classList.add('active');
        }

        function toggleCommissionInfo() {
            const freeSelect = document.getElementById('free');
            const commissionInfo = document.getElementById('commission-info');
            if (freeSelect.value === 'no') {
                commissionInfo.style.display = 'block';
            } else {
                commissionInfo.style.display = 'none';
            }
        }

        function submitForm() {
            // Add form submission logic here
            alert('Form submitted!');
        }
    </script>
</body>
</html>
