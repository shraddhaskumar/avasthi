<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avasthi-dashboard</title>
    <link rel="stylesheet" href="./LandingPage.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>Avasthi</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#dashboard">Dashboard</a></li>
                    <li><a href="#profile">Profile</a></li>
                    <li><a href="#settings">Settings</a></li>
                    <li><a href="#logout">Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="welcome" id="dashboard">
        <div class="container">
            <h2>Welcome</h2>
            <p>Here is your dashboard where you can manage your activities and settings.</p>
        </div>
    </section>

    <section class="profile" id="profile">
        <div class="container">
            <h2>Your Profile</h2>
            <div class="profile-details">
                <p><strong>Name:</strong>[User's name]</p>
                <p><strong>Email:</strong> [User's Email]</p>
                <p><strong>Member since:</strong> [Join Date]</p>
            </div>
        </div>
    </section>

    <section class="features">
        <div class="container">
            <h2>Dashboard</h2>
            <div class="feature">
             <a href="./form.html">  <button type="submit">Weekly Survey</button></a>

            </div>
            <div class="feature">
              <a href="./daily.html"><button>Daily Task</button></a> 
                
            </div>
            <div class="feature">
                <a href="./planner.html"><button>Daily planner</button></a>
                
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 Avasthi. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
